<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado colorido -->
  <defs>
    <linearGradient id="gradientFondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8E72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD93D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientGuitarra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BCF7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="200" height="200" rx="40" fill="url(#gradientFondo)"/>
  
  <!-- D grande a la izquierda -->
  <g transform="translate(30, 100)">
    <path d="M 10 -40 L 30 -40 Q 50 -40 50 0 L 50 80 Q 50 120 30 120 L 10 120 Z" 
          fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="3" stroke-linejoin="round"/>
    <text x="35" y="50" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
          fill="white" text-anchor="middle" dominant-baseline="middle">D</text>
  </g>
  
  <!-- Guitarra a la derecha -->
  <g transform="translate(110, 60)">
    <!-- Cuerpo de la guitarra -->
    <ellipse cx="35" cy="45" rx="25" ry="38" fill="url(#gradientGuitarra)" stroke="white" stroke-width="2"/>
    
    <!-- Agujero de la guitarra -->
    <circle cx="35" cy="40" r="10" fill="rgba(0,0,0,0.2)" stroke="white" stroke-width="1.5"/>
    
    <!-- Trastes -->
    <line x1="35" y1="10" x2="35" y2="15" stroke="white" stroke-width="1.5"/>
    <line x1="35" y1="20" x2="35" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="35" y1="30" x2="35" y2="35" stroke="white" stroke-width="1.5"/>
    
    <!-- Clavijas -->
    <circle cx="25" cy="5" r="3" fill="white"/>
    <circle cx="35" cy="3" r="3" fill="white"/>
    <circle cx="45" cy="5" r="3" fill="white"/>
    
    <!-- Cuerdas -->
    <line x1="25" y1="8" x2="32" y2="75" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="30" y1="6" x2="34" y2="80" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="35" y1="5" x2="35" y2="82" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="40" y1="6" x2="36" y2="80" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="45" y1="8" x2="38" y2="75" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Puntos decorativos -->
  <circle cx="170" cy="30" r="6" fill="white" opacity="0.6"/>
  <circle cx="20" cy="170" r="5" fill="white" opacity="0.6"/>
  <circle cx="180" cy="170" r="4" fill="white" opacity="0.5"/>
</svg>
